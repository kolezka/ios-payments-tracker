name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run API unit tests
        run: cd packages/api && bun test tests/crypto.test.ts tests/schemas.test.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build API
        run: cd packages/api && bun build --target=bun src/index.ts --outdir=./dist

      - name: Build Web
        run: cd packages/web && bun run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payment_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: cd packages/web && bunx playwright install --with-deps chromium

      - name: Push database schema
        run: cd packages/api && bunx drizzle-kit push
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/payment_tracker

      - name: Start API server
        run: cd packages/api && bun run src/index.ts &
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/payment_tracker
          DEV_MODE: "true"
          PORT: "3010"
          BASE_URL: http://localhost:3011
          WEB_ORIGIN: http://localhost:3011

      - name: Build web app
        run: cd packages/web && bun run build

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3010/health && break
            sleep 1
          done

      - name: Run Playwright tests
        run: cd packages/web && bun run test:e2e
        env:
          API_URL: http://localhost:3010
          BASE_URL: http://localhost:3011
          DEV_MODE: "true"
          PORT: "3011"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7
