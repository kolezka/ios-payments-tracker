name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payment_tracker
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Unit tests
        run: cd packages/api && bun test tests/crypto.test.ts tests/schemas.test.ts

      - name: Build API
        run: cd packages/api && bun build --target=bun src/index.ts --outdir=./dist

      - name: Build Web
        run: cd packages/web && bun run build

      - name: Install Playwright
        run: cd packages/web && bunx playwright install --with-deps chromium

      - name: Push database schema
        run: cd packages/api && bunx drizzle-kit push --force
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/payment_tracker

      - name: Start API
        run: cd packages/api && bun run src/index.ts &
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/payment_tracker
          DEV_MODE: "true"
          PORT: "3010"
          BASE_URL: http://localhost:3011
          WEB_ORIGIN: http://localhost:3011

      - name: Wait for API
        run: timeout 30 bash -c 'until curl -sf http://localhost:3010/health; do sleep 1; done'

      - name: E2E tests
        run: cd packages/web && bun run test:e2e
        env:
          API_URL: http://localhost:3010
          BASE_URL: http://localhost:3011
          PORT: "3011"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7
