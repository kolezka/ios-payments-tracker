services:
  api:
    build:
      context: ./packages/api
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - DEV_MODE=${DEV_MODE:-false}
      - BASE_URL=${BASE_URL:-http://localhost:3011}
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:3011}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    volumes:
      - api-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3010/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 3m
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./packages/web
    ports:
      - "3011:3011"
    environment:
      - API_URL=http://api:3010
      - BASE_URL=${BASE_URL:-http://localhost:3011}
      - PORT=3011
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - DEV_MODE=${DEV_MODE:-false}
    volumes:
      - ./logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3011').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 3m
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  api-data:
