services:
  api:
    build:
      context: ./packages/api
    ports:
      - "3010:3010"
    environment:
      - AUTH_TOKEN=${AUTH_TOKEN}
      - PORT=3010
    volumes:
      - api-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3010/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./packages/web
    ports:
      - "3011:3011"
    environment:
      - API_URL=http://api:3010
      - AUTH_TOKEN=${AUTH_TOKEN}
      - PORT=3011
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3011').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  api-data:
