services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-payment_tracker}
      APP_DB_USER: ${APP_DB_USER:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    expose:
      - "5432"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./packages/api
    ports:
      - "3010:3010"
    environment:
      - PORT=3010
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DEV_MODE=${DEV_MODE:-false}
      - DATABASE_URL=${DATABASE_URL:-postgres://${APP_DB_USER:-app}:${APP_DB_PASSWORD}@db:5432/${DB_NAME:-payment_tracker}}
      - BASE_URL=${SERVICE_URL_WEB:-http://localhost:3011}
      - WEB_ORIGIN=${SERVICE_URL_WEB:-http://localhost:3011}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ./logs:/app/logs
    networks:
      - backend
      - frontend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3010/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./packages/web
    ports:
      - "3011:3011"
    environment:
      - API_URL=http://api:3010
      - BASE_URL=${SERVICE_URL_WEB:-http://localhost:3011}
      - PORT=3011
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DEV_MODE=${DEV_MODE:-false}
    volumes:
      - ./logs:/app/logs
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3011').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  backend:
    internal: true
  frontend:

volumes:
  pgdata:
